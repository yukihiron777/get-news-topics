name: Fetch Toyokeizai

on:
  schedule:
    # JST 9:00 = UTC 0:00
    - cron: '0 0 * * *'
    # JST 14:00 = UTC 5:00
    - cron: '0 5 * * *'
    # JST 19:00 = UTC 10:00
    - cron: '0 10 * * *'
  workflow_dispatch: # 手動実行を許可

permissions:
  contents: write

jobs:
  fetch-toyokeizai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Toyokeizai ranking
        run: npm run fetch:toyokeizai

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/toyokeizai/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update toyokeizai data - $(date -u '+%Y-%m-%d %H:%M:%S UTC')" && git push)
