name: Fetch All News

on:
  schedule:
    # JST 4:00 = UTC 19:00 (前日)
    - cron: '0 19 * * *'
    # JST 8:00 = UTC 23:00 (前日)
    - cron: '0 23 * * *'
    # JST 11:00 = UTC 2:00
    - cron: '0 2 * * *'
    # JST 16:00 = UTC 7:00
    - cron: '0 7 * * *'
    # JST 21:00 = UTC 12:00
    - cron: '0 12 * * *'
  workflow_dispatch: # 手動実行を許可

permissions:
  contents: write

jobs:
  fetch-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download sources.json from np-docs
        run: gh api repos/yukihiron777/np-docs/contents/sources.json --jq '.content' | base64 -d > sources.json
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Fetch Nikkei news
        run: npm run fetch
        continue-on-error: true

      - name: Fetch Nikkei Business ranking
        run: npm run fetch:nikkei-business
        continue-on-error: true

      - name: Fetch Toyokeizai ranking
        run: npm run fetch:toyokeizai
        continue-on-error: true

      - name: Fetch NYTimes news
        run: npm run fetch:nytimes
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update news data - $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')" && git pull --rebase && git push)
