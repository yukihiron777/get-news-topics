name: Fetch Nikkei Business

on:
  schedule:
    # JST 8:30 = UTC 23:30 (前日) — 日経新聞と30分ずらす
    - cron: '30 23 * * *'
    # JST 12:30 = UTC 3:30
    - cron: '30 3 * * *'
    # JST 18:30 = UTC 9:30
    - cron: '30 9 * * *'
  workflow_dispatch: # 手動実行を許可

permissions:
  contents: write

jobs:
  fetch-nikkei-business:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Nikkei Business ranking
        run: npm run fetch:nikkei-business

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/nikkei-business/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update nikkei-business data - $(date -u '+%Y-%m-%d %H:%M:%S UTC')" && git push)
